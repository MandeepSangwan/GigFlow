version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart_leads_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smart_leads_network

  backend:
    build:
      context: ./backend
    container_name: smart_leads_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=supersecretjwtkey_for_smart_leads_dashboard
    depends_on:
      - mongodb
    networks:
      - smart_leads_network

  frontend:
    build:
      context: ./frontend
    container_name: smart_leads_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart_leads_network

volumes:
  mongodb_data:

networks:
  smart_leads_network:
    driver: bridge
